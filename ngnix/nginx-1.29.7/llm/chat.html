<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서버 트래픽 분석 AI</title>
<style>


/* ── 리셋 & 기본 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #21262d;
  --border:    #30363d;
  --text:      #e6edf3;
  --muted:     #8b949e;
  --blue:      #58a6ff;
  --green:     #3fb950;
  --yellow:    #e3b341;
  --red:       #f85149;
  --user-bg:   #1f6feb;
  --mono:      'Courier New', monospace;
  --sans:      Arial, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
}

/* ── 레이아웃 ── */
.app {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  height: 100vh;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 1rem;
}

/* ── 헤더 ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 0 0.8rem;
  border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 0.7rem; }
.logo {
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--blue);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.status {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--green);
}
.status-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 5px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.back-btn {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  transition: color 0.2s, border-color 0.2s;
}
.back-btn:hover { color: var(--text); border-color: var(--muted); }

/* ── API Key 입력 (숨김 - app.py에서 자동 주입) ── */
.api-bar { display: none; }

/* ── 메트릭 카드 ── */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
  padding: 0.7rem 0 0.5rem;
}
.metric {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 0.8rem;
  text-align: center;
}
.metric-val {
  font-family: var(--mono);
  font-size: 1.45rem;
  font-weight: 600;
  line-height: 1;
}
.metric-lbl {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 0.2rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.c-blue   { color: var(--blue); }
.c-green  { color: var(--green); }
.c-yellow { color: var(--yellow); }
.c-red    { color: var(--red); }

/* ── 채팅 영역 ── */
.chat-area {
  overflow-y: auto;
  padding: 0.8rem 0;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-wrap { display: flex; flex-direction: column; }
.msg-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 0.2rem;
}
.msg-wrap.user .msg-label { text-align: right; }

.bubble {
  max-width: 78%;
  padding: 0.7rem 1rem;
  border-radius: 14px;
  font-size: 0.88rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-wrap.user  { align-items: flex-end; }
.msg-wrap.bot   { align-items: flex-start; }
.bubble.user-b  {
  background: var(--user-bg);
  color: #fff;
  border-radius: 14px 14px 4px 14px;
  box-shadow: 0 2px 8px rgba(31,111,235,0.3);
}
.bubble.bot-b   {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px 14px 14px 4px;
}

/* 타이핑 인디케이터 */
.typing-dots span {
  display: inline-block;
  width: 5px; height: 5px;
  background: var(--muted);
  border-radius: 50%;
  margin: 0 2px;
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* ── 빠른 질문 ── */
.quick-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  padding: 0.4rem 0;
  border-top: 1px solid var(--border);
}
.quick-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 20px;
  padding: 0.28rem 0.75rem;
  font-size: 0.75rem;
  font-family: var(--sans);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.quick-btn:hover { color: var(--blue); border-color: var(--blue); }

/* ── 입력창 ── */
.input-row {
  display: flex;
  gap: 0.5rem;
  padding: 0.7rem 0 1rem;
  border-top: 1px solid var(--border);
}
.input-row textarea {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.88rem;
  padding: 0.65rem 0.9rem;
  resize: none;
  outline: none;
  height: 44px;
  max-height: 140px;
  overflow-y: auto;
  transition: border-color 0.2s;
  line-height: 1.5;
}
.input-row textarea:focus { border-color: var(--blue); }
.input-row textarea::placeholder { color: var(--muted); }
.send-btn {
  background: var(--blue);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0 1.1rem;
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  white-space: nowrap;
}
.send-btn:hover   { background: #79c0ff; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header>
    <div class="header-left">
      <span class="logo">⬡ Traffic Analyst AI</span>
      <span class="status"><span class="status-dot"></span>ONLINE</span>
    </div>
    <a class="back-btn" href="/">← 돌아가기</a>
  </header>

  <!-- API Key 입력 -->
  <div class="api-bar">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="apiKey" value="__ANTHROPIC_API_KEY__" />
  </div>

  <!-- 메트릭 카드 (JS로 채워짐) -->
  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-val c-blue" id="m-total">—</div><div class="metric-lbl">총 레코드</div></div>
    <div class="metric"><div class="metric-val c-green" id="m-normal">—</div><div class="metric-lbl">🟢 정상</div></div>
    <div class="metric"><div class="metric-val c-yellow" id="m-caution">—</div><div class="metric-lbl">🟡 주의</div></div>
    <div class="metric"><div class="metric-val c-red" id="m-danger">—</div><div class="metric-lbl">🔴 위험</div></div>
  </div>

  <!-- 채팅 -->
  <div class="chat-area" id="chatArea"></div>

  <!-- 빠른 질문 -->
  <div class="quick-row" id="quickRow"></div>

  <!-- 입력 -->
  <div class="input-row">
    <textarea id="userInput" placeholder="서버 트래픽에 대해 질문하세요..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">전송 ↑</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════

    { time:"16:08", server:"192.168.30.130:80", real_req:1, pred_req:2.3, real_rt:1.0,  pred_rt:0.98, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },

    { time:"16:34", server:"192.168.30.130:80", real_req:2, pred_req:2.5, real_rt:1.0,  pred_rt:1.13, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"16:36", server:"192.168.30.129:80", real_req:1, pred_req:2.5, real_rt:1.0,  pred_rt:1.02, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },

    { time:"19:50", server:"192.168.37.133:80", real_req:1, pred_req:1.3, real_rt:1.0,  pred_rt:0.91, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"19:50", server:"192.168.37.134:80", real_req:1, pred_req:1.5, real_rt:1.0,  pred_rt:0.87, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"19:51", server:"unknown",           real_req:1, pred_req:1.4, real_rt:1.0,  pred_rt:0.92, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"19:51", server:"192.168.37.133:80", real_req:1, pred_req:1.3, real_rt:1.0,  pred_rt:0.92, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"19:51", server:"192.168.37.134:80", real_req:1, pred_req:1.4, real_rt:1.0,  pred_rt:0.89, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"21:47", server:"192.168.30.129:80", real_req:2, pred_req:2.0, real_rt:1.0,  pred_rt:0.96, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"21:47", server:"192.168.30.130:80", real_req:3, pred_req:2.1, real_rt:1.0,  pred_rt:1.01, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
    { time:"21:56", server:"192.168.30.129:80", real_req:1, pred_req:1.9, real_rt:1.0,  pred_rt:0.96, real_err:"0.0%", pred_err:"0.0%", real_succ:"100.0%", pred_succ:"100.0%", anomaly:"0.0%",  risk:"🟢 정상" },
  ]
};

// ── 실시간 데이터 fetch ──────────────────────────────────
async function fetchTrafficData() {
  try {
    const resp = await fetch('/api/traffic-data');
    if (!resp.ok) return;
    const json = await resp.json();
    if (json.error) return;

    // DATA 갱신
    DATA.summary = json.summary;
    DATA.records = json.records;

    // 메트릭 카드 업데이트
    const s = json.summary;
    document.getElementById('m-total').textContent   = s.total;
    document.getElementById('m-normal').textContent  = s.normal;
    document.getElementById('m-caution').textContent = s.caution;
    document.getElementById('m-danger').textContent  = s.danger;
  } catch(e) {
    console.error('데이터 로드 실패:', e);
  }
}

function renderMetrics() {
  // 초기값 유지 (fetchTrafficData가 비동기로 채움)
}

// ── 빠른 질문 버튼 ────────────────────────────────────────
const QUICK = [
  "전체 현황 요약해줘",
  "이상 트래픽 있어?",
  "서버별 응답시간 알려줘",
  "가장 요청 많은 시간대는?",
  "에러율 높은 서버 있어?",
  "위험한 서버 있어?",
  "관리자 입장에서 지금 어떤 조치를 해야 해?",
  "트래픽 분산 정책 유지해도 돼?"
];

function renderQuickBtns() {
  const row = document.getElementById('quickRow');
  QUICK.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = q;
    btn.onclick = () => { sendMessageWith(q); };
    row.appendChild(btn);
  });
}

// ── 채팅 ─────────────────────────────────────────────────
const chatHistory = []; // Claude API 에 보낼 히스토리

function addBubble(role, text) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'YOU' : 'AI ANALYST';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role === 'user' ? 'user-b' : 'bot-b'}`;
  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.id = 'typingWrap';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'AI ANALYST';

  const bubble = document.createElement('div');
  bubble.className = 'bubble bot-b typing-dots';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingWrap');
  if (el) el.remove();
}


// ── 로컬 NLP 엔진 호출 (/api/chat) ──────────────────────
async function callClaude(userText) {
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText }),
    });
    if (!resp.ok) return `⚠️ 서버 오류 (${resp.status})`;
    const data = await resp.json();
    return data.reply || '응답을 받지 못했습니다.';
  } catch (e) {
    return `⚠️ 연결 오류: ${e.message}`;
  }
}
// ── 전송 로직 ────────────────────────────────────────────
async function sendMessageWith(text) {
  if (!text.trim()) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  addBubble('user', text);
  document.getElementById('userInput').value = '';
  showTyping();

  const reply = await callClaude(text);
  removeTyping();
  addBubble('bot', reply);
  btn.disabled = false;
}

function sendMessage() {
  const input = document.getElementById('userInput');
  sendMessageWith(input.value.trim());
}

// ── textarea Enter 키 전송 (Shift+Enter 줄바꿈) ───────────
document.addEventListener('DOMContentLoaded', () => {
  fetchTrafficData();
  renderQuickBtns();

  // 인사 메시지
  const s = DATA.summary;
  addBubble('bot',
    `안녕하세요! 서버 트래픽 분석 AI입니다 🖥️\n\n` +
    `현재 ${s.total}건의 트래픽 데이터를 분석했습니다.\n` +
    `정상 ${s.normal}건 / 주의 ${s.caution}건 / 위험 ${s.danger}건\n\n` +
    `무엇이든 질문해 주세요!`
  );

  const ta = document.getElementById('userInput');
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  // 자동 높이 조절
  ta.addEventListener('input', () => {
    ta.style.height = '44px';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  });
});
</script>
